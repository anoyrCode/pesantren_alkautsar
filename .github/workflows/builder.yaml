name: Build & Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: vars
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Create frontend env
        run: |
          cat > .env.production << EOF
          VITE_GA4_ID=${{ secrets.VITE_GA4_ID }}
          VITE_SITE_URL=${{ secrets.VITE_SITE_URL }}
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          EOF

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/pesantren-alkautsar-fe:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/pesantren-alkautsar-fe:${{ github.sha }}

      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/pesantren-alkautsar-be:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/pesantren-alkautsar-be:${{ github.sha }}
